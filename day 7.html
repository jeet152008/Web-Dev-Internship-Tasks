<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScaleX Blogs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#000;
    color:#fff;
    padding:30px 60px;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:70px;
}

.logo{
    font-size:30px;
    font-weight:700;
}

.logo span{
    color:#ff5c1a;
}

.menu{
    list-style:none;
    display:flex;
    gap:50px;
}

.menu a{
    text-decoration:none;
    color:#fff;
    font-size:18px;
    transition:.3s;
}

.menu a:hover{
    color:#ff5c1a;
}

.start-btn{
    padding:15px 28px;
    border:none;
    border-radius:14px;
    background:#121212;
    color:#fff;
    font-size:17px;
    cursor:pointer;
}

/* Hero */

.hero{
    text-align:center;
}

.hero h1{
    font-size:120px;
    font-weight:800;
    line-height:1;
    margin-bottom:40px;
}

/* Category Buttons */

.category{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-bottom:70px;
}

.category button{
    border:none;
    background:#121212;
    color:white;
    padding:15px 28px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
}

.category .active{
    background:#ff5c1a;
}

/* Cards */

.blog-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:#0d0d0d;
    border-radius:28px;
    overflow:hidden;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.tag{
    display:inline-block;
    background:#5a250d;
    color:#ff9c6d;
    padding:10px 18px;
    border-radius:30px;
    margin-bottom:20px;
}

.content h3{
    font-size:34px;
    line-height:1.2;
    margin-bottom:20px;
}

.content p{
    color:#808080;
    font-size:18px;
}

/* Responsive */

@media(max-width:1100px){

    .hero h1{
        font-size:80px;
    }

    .blog-container{
        grid-template-columns:1fr;
    }
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .navbar{
        flex-direction:column;
        gap:20px;
    }

    .menu{
        gap:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h1{
        font-size:55px;
    }

    .category{
        flex-wrap:wrap;
    }
}

</style>
</head>
<body>

<nav class="navbar">

    <div class="logo">
        <span>⚡</span> ScaleX
    </div>

    <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Blogs</a></li>
        <li><a href="#">Contact Us</a></li>
    </ul>

    <button class="start-btn">Get Started</button>

</nav>

<section class="hero">

    <h1>Insights & Blogs</h1>

    <div class="category">
        <button class="active">All</button>
        <button>Tech</button>
        <button>SaaS</button>
        <button>Marketing</button>
    </div>

</section>

<section class="blog-container">

    <!-- Card 1 -->
    <div class="card">

        <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1?w=1200" alt="Tech">

        <div class="content">
            <span class="tag">Tech</span>
            <h3>The Ultimate Guide To SaaS Marketing</h3>
            <p>May 23, 2025</p>
        </div>

    </div>

    <!-- Card 2 (Changed Bed/Chair Image) -->
    <div class="card">

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200" alt="SaaS">

        <div class="content">
            <span class="tag">SaaS</span>
            <h3>5 Key Trends In SaaS Growth For 2025</h3>
            <p>May 23, 2025</p>
        </div>

    </div>

    <!-- Card 3 -->
    <div class="card">

        <img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=1200" alt="Marketing">

        <div class="content">
            <span class="tag">Marketing</span>
            <h3>How Data-Driven Strategies Are Important</h3>
            <p>May 23, 2025</p>
        </div>

    </div>

</section>

</body>
</html>
